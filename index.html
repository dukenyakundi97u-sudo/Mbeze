<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yobby AI - Cyber UI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #bc00ff;
            --bg-dark: #0a0a0a;
            --red: #ff3b3b;
            --toxic-alert: #ff0055;
            --font-head: 'Audiowide', cursive;
            --font-main: 'Rajdhani', sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            background-color: var(--bg-dark);
            font-family: var(--font-main);
            color: white;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- INTRO SCREEN --- */
        #introScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            box-shadow: inset 0 0 100px #000;
        }

        .loader-container { position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; z-index: 1; }
        .circle { position: absolute; border-radius: 50%; border: 2px solid transparent; box-shadow: 0 0 15px var(--purple); }
        .c1 { width: 100%; height: 100%; border-top: 3px solid var(--purple); border-left: 3px solid var(--purple); animation: spin 3s linear infinite; }
        .c2 { width: 75%; height: 75%; border-bottom: 3px solid var(--cyan); border-right: 3px solid var(--cyan); animation: spin-reverse 2s linear infinite; }
        .c3 { width: 50%; height: 50%; border: 2px dashed var(--toxic-alert); animation: spin 5s linear infinite; }
        .core { width: 15px; height: 15px; background: var(--purple); border-radius: 50%; box-shadow: 0 0 30px var(--purple); animation: pulse-core 1s ease-in-out infinite alternate; }
        
        .intro-text { 
            margin-top: 30px; font-family: var(--font-head); color: var(--purple); 
            letter-spacing: 3px; font-size: 1.2rem; text-shadow: 0 0 15px var(--purple); 
            animation: flicker 2s infinite; text-align: center; text-transform: uppercase;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        @keyframes pulse-core { from { transform: scale(0.8); opacity: 0.5; } to { transform: scale(1.2); opacity: 1; } }
        @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; } 20%, 24%, 55% { opacity: 0.5; } }

        /* --- UI ELEMENTS --- */
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        header {
            display: none; justify-content: space-between; align-items: center; padding: 15px 20px;
            background: rgba(0, 0, 0, 0.85); border-bottom: 1px solid #333; z-index: 10;
        }

        .logo { font-family: var(--font-head); color: var(--cyan); letter-spacing: 3px; text-shadow: 0 0 10px var(--cyan); }

        #mainChat { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; gap: 15px; }

        .message {
            max-width: 80%; padding: 12px 18px; backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .user-msg { align-self: flex-end; background: rgba(188, 0, 255, 0.15); border-right: 3px solid var(--purple); border-radius: 10px 0 0 10px; }
        .bot-msg { align-self: flex-start; background: rgba(0, 0, 0, 0.7); border-left: 3px solid var(--cyan); border-radius: 0 10px 10px 0; }

        .meta { font-family: var(--font-head); font-size: 11px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }

        .content { font-weight: 400; font-size: 1.05rem; line-height: 1.4; display: flex; flex-direction: column; gap: 8px; }

        .preview-img { max-width: 200px; border: 1px solid var(--cyan); margin-top: 5px; border-radius: 4px; }

        #inputArea { display: none; background: #000; padding: 15px; gap: 10px; align-items: center; border-top: 1px solid #222; position: relative; }

        .upload-label {
            background: var(--purple); width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 10px var(--purple); cursor: pointer; font-size: 24px; transition: 0.3s;
        }

        /* --- ACTION MENU POPUP --- */
        #actionMenu {
            display: none; position: absolute; bottom: 70px; left: 15px; 
            background: rgba(15, 15, 15, 0.98); border: 1px solid #333; 
            border-radius: 15px; padding: 20px; width: 280px;
            box-shadow: 0 0 30px rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 100; animation: fadeIn 0.2s ease-out;
        }
        .menu-row { display: flex; justify-content: space-around; align-items: center; }
        .menu-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon-circle { 
            width: 55px; height: 55px; border-radius: 50%; background: #222; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; border: 1px solid #444; color: #fff;
        }
        .menu-text { font-size: 11px; font-family: var(--font-head); color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .input-field {
            font-family: var(--font-main); flex: 1; background: #111; border: 1px solid #333;
            padding: 12px; color: white; border-radius: 4px; outline: none;
        }

        .send-btn {
            font-family: var(--font-head); background: linear-gradient(90deg, #8000ff, #bc00ff);
            border: none; color: white; padding: 10px 25px; cursor: pointer; box-shadow: 0 0 10px var(--purple);
        }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="introScreen">
        <div class="loader-container">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
            <div class="core"></div>
        </div>
        <div class="intro-text">TOXIC CHATTING PANEL ☠️</div>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <header id="appHeader">
        <div style="font-size: 20px;">☰</div>
        <div class="logo">LINK: YOBBY_CORE</div>
        <div style="font-family: var(--font-head); color: var(--cyan); font-size: 11px; border: 1px solid var(--cyan); padding: 4px 10px;">SUPPORT</div>
    </header>

    <div id="mainChat"><div class="room-id" style="align-self: center; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyan); padding: 5px 20px; border-radius: 20px; color: var(--cyan); font-family: var(--font-head); font-size: 0.9rem;">ID: SESSION_001</div></div>

    <div id="inputArea">
        <div id="actionMenu">
            <div class="menu-row">
                <div class="menu-item" onclick="triggerNative('camera')">
                    <div class="icon-circle">📷</div>
                    <div class="menu-text">Camera</div>
                </div>
                <div class="menu-item" onclick="triggerNative('gallery')">
                    <div class="icon-circle">🖼️</div>
                    <div class="menu-text">Gallery</div>
                </div>
                <div class="menu-item" onclick="triggerNative('files')">
                    <div class="icon-circle">📎</div>
                    <div class="menu-text">Files</div>
                </div>
            </div>
        </div>

        <div class="upload-label" onclick="toggleActionMenu()">+</div>
        
        <input type="file" id="cameraInput" capture="environment" accept="image/*" onchange="handleFileUpload(event)" style="display:none">
        <input type="file" id="galleryInput" accept="image/*" onchange="handleFileUpload(event)" style="display:none">
        <input type="file" id="fileInput" accept="*/*" onchange="handleFileUpload(event)" style="display:none">

        <input type="text" id="userInput" class="input-field" placeholder="send encrypted text...">
        <button class="send-btn" onclick="sendMessage()">SEND</button>
    </div>

<script>
    let currentImageBase64 = null;

    function formatTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    function toggleActionMenu() {
        const menu = document.getElementById('actionMenu');
        menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    }

    function triggerNative(type) {
        toggleActionMenu();
        if(type === 'camera') document.getElementById('cameraInput').click();
        if(type === 'gallery') document.getElementById('galleryInput').click();
        if(type === 'files') document.getElementById('fileInput').click();
    }

    // Close menu when clicking outside
    window.onclick = function(event) {
        if (!event.target.matches('.upload-label')) {
            document.getElementById('actionMenu').style.display = 'none';
        }
    }

    window.onload = function() {
        setTimeout(() => {
            document.getElementById("introScreen").style.animation = "fadeOut 0.8s forwards";
            setTimeout(() => {
                document.getElementById("introScreen").style.display = "none";
                document.getElementById("appHeader").style.display = "flex";
                document.getElementById("mainChat").style.display = "flex";
                document.getElementById("inputArea").style.display = "flex";
            }, 800);
        }, 3000);
    };

    // MATRIX EFFECT
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const letters = "010101"; 
    let drops = Array(Math.floor(canvas.width / 14)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0022"; ctx.font = "14px monospace";
        for (let i = 0; i < drops.length; i++) {
            ctx.fillText(letters[Math.floor(Math.random() * letters.length)], i * 14, drops[i] * 14);
            if (drops[i] * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    const API_KEY = "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";

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const chat = document.getElementById("mainChat");
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageBase64 = e.target.result;
                    chat.innerHTML += `<div class="message user-msg"><div class="content"><span style="color:var(--cyan)">[IMAGE_UPLOADED]:</span> ${file.name}<img src="${currentImageBase64}" class="preview-img"></div></div>`;
                    chat.scrollTop = chat.scrollHeight;
                };
                reader.readAsDataURL(file);
            } else {
                chat.innerHTML += `<div class="message user-msg"><div class="content"><span style="color:var(--cyan)">[FILE_UPLOADED]:</span> ${file.name}</div></div>`;
                chat.scrollTop = chat.scrollHeight;
            }
        }
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text && !currentImageBase64) return;

        const chat = document.getElementById("mainChat");
        const time = formatTime();

        let userContentHTML = `<span>${text}</span>`;
        if (currentImageBase64 && !text) userContentHTML = `<span>Analyzing attached visual...</span>`;
        
        chat.innerHTML += `
            <div class="message user-msg">
                <div class="meta" style="color:var(--purple)"><span>● YOU // ${time}</span></div>
                <div class="content">${userContentHTML}</div>
            </div>`;
        
        const messageContent = [];
        if (text) messageContent.push({ type: "text", text: text });
        if (currentImageBase64) messageContent.push({ type: "image_url", image_url: { url: currentImageBase64 } });

        input.value = "";
        currentImageBase64 = null; 
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
                body: JSON.stringify({ 
                    model: "gpt-4o-mini", 
                    messages: [{ role: "user", content: messageContent }],
                    max_tokens: 500 
                })
            });
            const data = await response.json();
            const replyText = data?.choices?.[0]?.message?.content || "LINK_ERROR: Core unresponsive.";

            chat.innerHTML += `
                <div class="message bot-msg">
                    <div class="meta" style="color:var(--cyan)"><span>● YOBBY AI // ${time}</span></div>
                    <div class="content">${replyText}</div>
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        } catch (e) {
            chat.innerHTML += `<div class="message bot-msg"><div class="content">SYSTEM_CRITICAL_FAILURE</div></div>`;
        }
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
